services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: agentdb
      MYSQL_USER: app
      MYSQL_PASSWORD: apppass
      MYSQL_ROOT_PASSWORD: rootpass
    command: ["--default-authentication-plugin=mysql_native_password"]
    ports: ["3306:3306"]
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -prootpass || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 40

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_USER: app
      DB_PASS: apppass
      DB_NAME: agentdb
      PORT: "8080"
    ports: ["8080:8080"]
    volumes:
      - .:/app
    command: ["npm","run","dev"]

volumes:
  dbdata:
