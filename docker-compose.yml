version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: multi_agent_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: multi_agent_solver
      MYSQL_USER: agent_user
      MYSQL_PASSWORD: agent_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - agent_network
    command: --default-authentication-plugin=mysql_native_password

  # Redis for caching (optional, for future use)
  redis:
    image: redis:7-alpine
    container_name: multi_agent_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agent_network

  # Application
  app:
    build: .
    container_name: multi_agent_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=multi_agent_solver
      - DB_USER=agent_user
      - DB_PASSWORD=agent_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./src:/app/src
      - ./plugins:/app/plugins
      - ./logs:/app/logs
    depends_on:
      - mysql
      - redis
    networks:
      - agent_network
    command: npm run dev

  # Nginx reverse proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: multi_agent_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - agent_network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  agent_network:
    driver: bridge
